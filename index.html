<script>

/* ═══ Utilitaires ═══ */
function $(id){return document.getElementById(id)}
function fmtD(i){if(!i)return'\u2014';return new Date(i).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtDT(i){if(!i)return'\u2014';return fmtD(i)+' '+new Date(i).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function bizSince(iso){var s=new Date(iso);s.setHours(0,0,0,0);var n=new Date();n.setHours(0,0,0,0);var c=0,d=new Date(s);while(d<n){d.setDate(d.getDate()+1);var w=d.getDay();if(w!==0&&w!==6)c++}return c}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sBadge(st){var c={attente:'sb-a',valide:'sb-v',annule:'sb-x'};var l={attente:'En attente de signature',valide:'Valid\u00e9',annule:'Annul\u00e9'};return'<span class="sb '+(c[st]||'')+'">'+(l[st]||st)+'</span>'}
function mapSI(s){if(!s)return'attente';if(s.indexOf('Valid')>=0)return'valide';if(s.indexOf('Annul')>=0)return'annule';return'attente'}

/* ═══ Toast ═══ */
function toast(msg,type){
    type=type||'success';
    var c=$('toasts'),cols={success:'border-l-4 border-green-600 bg-white',error:'border-l-4 border-red-700 bg-white',warning:'border-l-4 border-amber-600 bg-white',info:'border-l-4 border-blue-700 bg-white'};
    var icons={success:'fa-check-circle text-green-600',error:'fa-times-circle text-red-700',warning:'fa-exclamation-triangle text-amber-600',info:'fa-info-circle text-blue-700'};
    var el=document.createElement('div');
    el.className='te '+(cols[type]||cols.info)+' shadow-lg rounded-lg px-4 py-3 flex items-center gap-3 min-w-[280px] max-w-[400px]';
    el.style.pointerEvents='auto';
    el.innerHTML='<i class="fas '+(icons[type]||icons.info)+'"></i><span class="text-sm font-medium" style="color:var(--text)">'+esc(msg)+'</span>';
    c.appendChild(el);
    setTimeout(function(){el.classList.replace('te','tx');setTimeout(function(){el.remove()},250)},3500);
}

/* ═══ Modal ═══ */
function showModal(title,body,actions){$('modal').innerHTML='<div class="mo" onclick="if(event.target===this)closeModal()"><div class="mbox fi"><div class="px-6 py-4 border-b" style="border-color:var(--border)"><h3 class="text-lg font-bold" style="font-family:Playfair Display,serif">'+title+'</h3></div><div class="px-6 py-5">'+body+'</div><div class="px-6 py-4 flex justify-end gap-3 border-t" style="border-color:var(--border)">'+actions+'</div></div></div>'}
function closeModal(){$('modal').innerHTML=''}

/* ═══ Logo ═══ */
function logo(h){h=h||'h-10';return'<svg viewBox="0 0 240 52" class="'+h+' flex-shrink-0" xmlns="http://www.w3.org/2000/svg"><g transform="translate(0,2)"><path d="M28,10 L32,4 L36,10 Z" fill="#1B5E20"/><rect x="26" y="10" width="12" height="2.5" rx=".5" fill="#1B5E20"/><rect x="27.5" y="12.5" width="1.8" height="12" fill="#1B5E20"/><rect x="31.1" y="12.5" width="1.8" height="12" fill="#1B5E20"/><rect x="34.7" y="12.5" width="1.8" height="12" fill="#1B5E20"/><rect x="26" y="24.5" width="12" height="2" rx=".5" fill="#1B5E20"/><path d="M8,22 C8,18 10,14 12,13 L13,10 L14.5,12.5 L16,10 L16.5,13 L18,12 L18.5,14.5 L20,14 L20,16.5 L21.5,16.5 L21.5,18 L20,18.5 L20.5,20 L19,20.5 L19,22.5 L17.5,23 L18,25 L16.5,25 L16,23 L14.5,25 L13,25 L13.5,23 L12,23.5 L11.5,22 Z" fill="#1B5E20"/><path d="M47,22 C47,18 45,14 43,13 L42,10 L40.5,12.5 L39,10 L38.5,13 L37,12 L36.5,14.5 L35,14 L35,16.5 L33.5,16.5 L33.5,18 L35,18.5 L34.5,20 L36,20.5 L36,22.5 L37.5,23 L37,25 L38.5,25 L39,23 L40.5,25 L42,25 L41.5,23 L43,23.5 L43.5,22 Z" fill="#1B5E20"/></g><text x="58" y="14" font-size="7" fill="#9E9E9E" font-family="Source Sans 3,sans-serif" letter-spacing=".5">DEPUIS 2005</text><text x="58" y="34" font-size="22" fill="#1B5E20" font-family="Playfair Display,serif" font-weight="900" letter-spacing=".5">REAL 31</text><text x="58" y="46" font-size="8" fill="#9E9E9E" font-family="Source Sans 3,sans-serif" font-weight="600" letter-spacing="3.5">IMMOBILIER</text></svg>'}

/* ═══ État ═══ */
var CU=null,VW='dashboard',VP={},msalInstance=null,_clients=[];

function nav(v,p){p=p||{};VW=v;VP=p;window.location.hash=v+(p.id?'/'+p.id:'');render()}
function parseHash(){var h=(window.location.hash||'#dashboard').slice(1).split('/');return{view:h[0]||'dashboard',params:h[1]?{id:h[1]}:{}}}
window.addEventListener('hashchange',function(){var r=parseHash();VW=r.view;VP=r.params;render()});

/* ═══ Chargement dynamique d'un script ═══ */
function loadScript(url){return new Promise(function(ok,no){var s=document.createElement('script');s.src=url;s.onload=ok;s.onerror=no;document.head.appendChild(s)})}

/* ═══ Authentification ═══ */
function initAuth(){
    /* Si les valeurs ne sont pas remplies : page de config */
    if(!CLIENT_ID||!TENANT_ID){
        $('app').innerHTML=viewConfig();
        return;
    }
    /* Sinon : charger MSAL depuis le CDN puis initialiser */
    $('app').innerHTML='<div class="ld"></div>';
    loadScript('https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js').then(function(){
        try{
            var cfg={auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,redirectUri:REDIRECT_URI},cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}};
            msalInstance=new msal.PublicClientApplication(cfg);
            msalInstance.initialize().then(function(){
                msalInstance.handleRedirectPromise().then(function(resp){
                    if(resp)loadUser(resp.account);
                    else{var acc=msalInstance.getAllAccounts();if(acc.length)loadUser(acc[0]);else render()}
                }).catch(function(){render()});
            }).catch(function(){render()});
        }catch(e){
            $('app').innerHTML=viewConfigError('Erreur MSAL : '+e.message);
        }
    }).catch(function(){
        $('app').innerHTML=viewConfigError('Impossible de charger la biblioth\u00e8que MSAL depuis le CDN. Votre r\u00e9seau ou votre antivirus bloque peut-\u00eatre alcdn.msauth.net.');
    });
}

function loadUser(account){
    CU={id:account.homeAccountId,email:account.username,name:account.name||account.username.split('@')[0].replace(/\./g,' '),role:'user',agencies:[]};
    spGet(L_USERS,"?$filter=Email eq '"+account.username+"'&$top=1").then(function(data){
        if(data.value&&data.value.length){var u=data.value[0];CU.id=String(u.Id);CU.role=u.Role||'user';CU.agencies=(u.Agences||'').split(';').filter(function(a){return a.trim()})}
        else{spPost(L_USERS,{Title:CU.name,DisplayName:CU.name,Email:CU.email,Role:'user',Agences:''}).then(function(r){CU.id=String(r.Id)}).catch(function(){})}
        render();
    }).catch(function(){render()});
}

window.doLogin=function(){
    if(!msalInstance){toast('Configuration manquante','error');return}
    msalInstance.loginPopup({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All']}).catch(function(e){if(e.errorCode!=='user_cancelled')toast('Erreur: '+(e.message||e.errorCode),'error')});
};
window.doLogout=function(){if(msalInstance)msalInstance.logoutPopup().catch(function(){});CU=null};

/* ═══ Page config ═══ */
function viewConfig(){
    return'<div class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#f5f5f0,#e8e8e0)"><div class="w-full max-w-lg"><div class="text-center mb-8 flex flex-col items-center gap-4">'+logo('h-14')+'<p class="text-lg font-semibold" style="color:var(--text2)">Registre des mandats de gestion</p></div><div class="cd p-8" style="box-shadow:0 4px 24px rgba(0,0,0,.08)"><div class="flex items-center gap-3 mb-6"><div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:#FFF3E0"><i class="fas fa-cog text-xl" style="color:var(--warning)"></i></div><div><h2 class="text-lg font-bold" style="font-family:Playfair Display,serif">Configuration requise</h2><p class="text-xs" style="color:var(--text3)">4 valeurs \u00e0 remplir dans le fichier HTML</p></div></div><div class="space-y-3 text-sm"><div class="p-4 rounded-lg" style="background:var(--primary-l)"><p class="font-bold" style="color:var(--primary)">1. CLIENT_ID</p><p style="color:var(--text2)">Azure AD \u2192 Inscriptions d\'applications \u2192 ID d\'application (client)</p></div><div class="p-4 rounded-lg" style="background:var(--primary-l)"><p class="font-bold" style="color:var(--primary)">2. TENANT_ID</p><p style="color:var(--text2)">Azure AD \u2192 Vue d\'ensemble \u2192 ID de locataire</p></div><div class="p-4 rounded-lg" style="background:var(--primary-l)"><p class="font-bold" style="color:var(--primary)">3. REDIRECT_URI</p><p style="color:var(--text2)">URL compl\u00e8te du fichier sur SharePoint</p></div><div class="p-4 rounded-lg" style="background:var(--primary-l)"><p class="font-bold" style="color:var(--primary)">4. SP_SITE</p><p style="color:var(--text2)">URL du site SharePoint (sans / \u00e0 la fin)</p></div></div><p class="text-xs mt-6 text-center" style="color:var(--text3)">Ouvrez ce fichier avec le Bloc-notes, remplissez les 4 valeurs tout en haut du script, puis rechargez la page.</p></div></div></div>';
}

function viewConfigError(msg){
    return viewConfig().replace('</div></div>','</div><div class="cd mt-4 p-6 border-l-4" style="border-color:var(--danger)"><p class="font-bold text-sm" style="color:var(--danger)">Erreur</p><p class="text-sm mt-1" style="color:var(--text2)">'+esc(msg)+'</p></div></div></div>');
}

/* ═══ SharePoint API ═══ */
function getToken(){var acc=msalInstance.getAllAccounts();if(!acc.length)return Promise.reject(new Error('Non connect\u00e9'));return msalInstance.acquireTokenSilent({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All'],account:acc[0]}).catch(function(){return msalInstance.acquireTokenPopup({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All'],account:acc[0]})}).then(function(r){return r.accessToken})}
function spGet(list,opts){opts=opts||'';return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items"+opts,{headers:{'Authorization':'Bearer '+t,'Accept':'application/json;odata=nometadata'}}).then(function(r){if(!r.ok)throw new Error('SharePoint '+r.status);return r.json()})})}
function spPost(list,item){return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items",{method:'POST',headers:{'Authorization':'Bearer '+t,'Accept':'application/json;odata=nometadata','Content-Type':'application/json'},body:JSON.stringify(item)}).then(function(r){if(!r.ok)throw new Error('SP POST '+r.status);return r.json()})})}
function spPatch(list,id,item){return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items("+id+")",{method:'POST',headers:{'Authorization':'Bearer '+t,'Accept':'application/json;odata=nometadata','Content-Type':'application/json','X-HTTP-Method':'MERGE','If-Match':'*'},body:JSON.stringify(item)}).then(function(r){if(!r.ok)throw new Error('SP PATCH '+r.status)})})}
function spDel(list,id){return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items("+id+")",{method:'POST',headers:{'Authorization':'Bearer '+t,'X-HTTP-Method':'DELETE','If-Match':'*'}})})}
function spUploadPDF(name,blob){return getToken().then(function(t){var path=SP_SITE.replace('https://','');return fetch(SP_SITE+"/_api/web/getfolderbyserverrelativeurl('"+path+"/"+L_PDF+"')/files/add(url='"+name+"',overwrite=true)",{method:'POST',headers:{'Authorization':'Bearer '+t,'X-HTTP-Method':'PUT'},body:blob}).then(function(r){if(!r.ok)throw new Error('Upload '+r.status);return r.json()}).then(function(d){return d.ServerRelativeUrl?'https://'+d.ServerRelativeUrl:null})})}

/* ═══ Store ═══ */
var S={
    getUsers:function(){return spGet(L_USERS,'?$top=5000').then(function(d){return(d.value||[]).map(function(u){return{id:String(u.Id),email:u.Email||'',name:u.DisplayName||u.Title||'',role:u.Role||'user',agencies:(u.Agences||'').split(';').filter(function(a){return a.trim()})}})})},

    h+='</div><div class="p-6"><div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6"><div><p class="text-xs font-semibold uppercase mb-1" style="color:var(--text3)">Client</p><p class="text-lg font-semibold">'+esc(m.clientName)+'</p></div><div><p class="text-xs font-semibold uppercase mb-1" style="color:var(--text3)">N\u00e9gociateur</p><div class="flex items-center gap-2"><div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-[11px] font-bold" style="background:var(--primary)">'+(u?u.name.split(' ').map(function(n){return n[0]}).join(''):'?')+'</div><span class="font-semibold">'+(u?esc(u.name):'\u2014')+'</span></div></div><div><p class="text-xs font-semibold uppercase mb-1" style="color:var(--text3)">Agences</p><div class="flex flex-wrap gap-1">';
    if(u)u.agencies.forEach(function(a){h+='<span class="text-xs px-2 py-0.5 rounded-full border" style="border-color:var(--border);color:var(--text2)">'+esc(a)+'</span>'});
    h+='</div></div><div><p class="text-xs font-semibold uppercase mb-1" style="color:var(--text3)">D\u00e9lai</p><p class="text-lg font-semibold" style="'+(lt?'color:var(--warning)':'')+'">'+days+' jour'+(days>1?'s':'')+' ouvr\u00e9'+(days>1?'s':'')+'</p></div></div>';
    if(m.status==='attente')h+='<div class="border-2 border-dashed rounded-xl p-8 text-center" style="border-color:var(--border)" ondragover="event.preventDefault();this.classList.add(\'da\')" ondragleave="this.classList.remove(\'da\')" ondrop="event.preventDefault();this.classList.remove(\'da\');upF(event.dataTransfer.files[0],'+m.spId+',\''+m.id+'\')"><i class="fas fa-cloud-upload-alt text-4xl mb-3" style="color:var(--text3)"></i><p class="font-semibold mb-1">D\u00e9posez le mandat sign\u00e9 ici</p><p class="text-sm mb-4" style="color:var(--text3)">PDF uniquement \u2014 une seule partie</p><label class="btn bp cursor-pointer"><i class="fas fa-file-pdf"></i> Choisir un fichier<input type="file" accept=".pdf" class="hidden" onchange="upF(this.files[0],'+m.spId+',\''+m.id+'\')"></label></div>';
    if(m.status==='valide')h+='<div class="rounded-xl p-6 flex items-center gap-4" style="background:var(--primary-l)"><div class="w-12 h-12 rounded-full flex items-center justify-center" style="background:var(--primary)"><i class="fas fa-check text-white text-lg"></i></div><div><p class="font-semibold" style="color:var(--success)">Mandat valid\u00e9</p><p class="text-sm" style="color:var(--text2)">D\u00e9pos\u00e9 le '+fmtDT(m.uploadedAt)+'</p></div>'+(m.fileUrl?'<a href="'+esc(m.fileUrl)+'" target="_blank" class="btn bo bs ml-auto"><i class="fas fa-download"></i> T\u00e9l\u00e9charger</a>':'')+'</div>';
    if(m.status==='annule')h+='<div class="rounded-xl p-6 flex items-center gap-4" style="background:#FFEBEE"><div class="w-12 h-12 rounded-full flex items-center justify-center" style="background:var(--danger)"><i class="fas fa-ban text-white text-lg"></i></div><div><p class="font-semibold" style="color:var(--danger)">Mandat annul\u00e9</p><p class="text-sm" style="color:var(--text2)">Annul\u00e9 le '+fmtDT(m.cancelledAt)+'</p></div></div>';
    h+='</div></div><div class="cd mt-6 p-6"><h3 class="font-bold text-base mb-5" style="font-family:Playfair Display,serif">Historique</h3>';
    var tl=[{i:'fa-hashtag',c:'var(--primary)',bg:'var(--primary-l)',l:'Num\u00e9ro '+m.number+' attribu\u00e9',d:'Demand\u00e9 par '+(u?u.name:'\u2014'),dt:m.createdAt}];
    if(m.uploadedAt)tl.push({i:'fa-upload',c:'var(--info)',bg:'#E3F2FD',l:'Mandat d\u00e9pos\u00e9',dt:m.uploadedAt});
    if(m.validatedAt)tl.push({i:'fa-check-circle',c:'var(--success)',bg:'var(--primary-l)',l:'Mandat valid\u00e9',dt:m.validatedAt});
    if(m.cancelledAt)tl.push({i:'fa-ban',c:'var(--danger)',bg:'#FFEBEE',l:'Mandat annul\u00e9',dt:m.cancelledAt});
    if(m.status==='attente')[3,6,10].forEach(function(rd){if(days>=rd)tl.push({i:'fa-bell',c:'var(--warning)',bg:'#FFF3E0',l:'Relance J+'+rd,dt:null})});
    tl.forEach(function(t){h+='<div class="ti"><div class="tdot" style="background:'+t.bg+';color:'+t.c+'"><i class="fas '+t.i+'"></i></div><div class="flex-1 pt-1"><p class="font-semibold text-sm">'+t.l+'</p>'+(t.dt?'<p class="text-xs mt-1" style="color:var(--text3)">'+fmtDT(t.dt)+'</p>':'')+'</div></div>'});
    h+='</div></div>';
    if(CU.role==='admin'){h+='<div class="cd p-6 h-fit"><h3 class="font-bold text-base mb-4" style="font-family:Playfair Display,serif"><i class="fas fa-eye mr-2 text-sm" style="color:var(--text3)"></i>Journal</h3>';if(!logs.length)h+='<p class="text-sm" style="color:var(--text3)">Aucune consultation</p>';else{logs.slice(0,15).forEach(function(l){h+='<div class="flex items-start gap-2 mb-3"><div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 mt-0.5" style="background:var(--primary-l);color:var(--primary)">'+(l.uname?l.uname.split(' ').map(function(n){return n[0]}).join(''):'?')+'</div><div><p class="text-sm font-semibold">'+esc(l.uname||'\u2014')+'</p><p class="text-xs" style="color:var(--text3)">'+fmtDT(l.at)+'</p></div></div>'})}h+='</div>'}
    h+='</div>';return lay(h,0);
}
window.upF=function(f,spId,id){if(!f)return;if(f.type!=='application/pdf'){toast('PDF uniquement','error');return}S.uploadMandat(spId,f).then(function(){toast('Mandat valid\u00e9','success');nav('mandat-detail',{id:id})}).catch(function(e){toast('Erreur: '+e.message,'error')})};
window.cancelM=function(id,spId){showModal('Annuler','<p class="text-sm mb-4" style="color:var(--text2)">Action irr\u00e9versible.</p><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Motif</label><textarea id="cancel-r" class="inp" rows="3"></textarea>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bd" onclick="doCancel(\''+id+'\','+spId+')"><i class="fas fa-ban"></i> Confirmer</button>')};
window.doCancel=function(id,spId){S.cancelMandat(spId,CU.email).then(function(){closeModal();toast('Mandat annul\u00e9','info');nav('mandat-detail',{id:id})}).catch(function(e){toast('Erreur: '+e.message,'error')})};

/* ═══ Notifications ═══ */
function viewNotifs(ns){var ur=ns.filter(function(n){return!n.read}).length;var h='<div class="flex items-center justify-between mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--primary)">Notifications</h1><p class="text-sm mt-1" style="color:var(--text2)">'+ur+' non lue'+(ur>1?'s':'')+'</p></div>'+(ur>0?'<button class="btn bo bs" onclick="markAllR()"><i class="fas fa-check-double"></i> Tout lire</button>':'')+'</div><div class="flex flex-col gap-3">';
    if(!ns.length)h+='<div class="cd p-12 text-center" style="color:var(--text3)"><i class="fas fa-bell-slash text-3xl mb-3"></i><p>Aucune notification</p></div>';
    ns.forEach(function(n){var last=n.rd===10;h+='<div class="cd '+(n.read?'':'bg-amber-50/50')+' p-4 flex items-start gap-4 cursor-pointer border-l-4 '+(n.read?'':'border-amber-400')+'" style="'+(n.read?'border-left-color:var(--border)':'')+'" onclick="readN(\''+n.id+'\',\''+n.mid+'\')"><div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background:'+(last?'#FFEBEE':'#FFF3E0')+'"><i class="fas '+(last?'fa-exclamation-triangle':'fa-bell')+'" style="color:'+(last?'var(--danger)':'var(--warning)')+'"></i></div><div class="flex-1"><div class="flex items-center gap-2 mb-1">'+(!n.read?'<span class="w-2 h-2 rounded-full" style="background:var(--warning)"></span>':'')+'<p class="text-sm font-semibold">'+esc(n.msg)+'</p></div><p class="text-xs" style="color:var(--text3)">'+fmtDT(n.at)+'</p></div></div>'});
    h+='</div>';return lay(h,ur)}
window.readN=function(id,mid){S.markRead(id).then(function(){if(mid)nav('mandat-detail',{id:mid});else render()})};
window.markAllR=function(){S.markAllRead().then(function(){toast('Notifications lues','info');render()})};

/* ═══ Admin utilisateurs ═══ */
function viewAdminUsers(us,ms){
    var h='<div class="flex items-center justify-between mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--primary)">Utilisateurs</h1><p class="text-sm mt-1" style="color:var(--text2)">'+us.length+' utilisateur'+(us.length>1?'s':'')+'</p></div><span class="btn bp" onclick="showUM()"><i class="fas fa-user-plus"></i> Ajouter</span></div><div class="cd overflow-x-auto"><table><thead><tr><th>Utilisateur</th><th class="hm">E-mail</th><th>R\u00f4le</th><th class="hm">Agences</th><th>Mandats</th><th></th></tr></thead><tbody>';
    us.forEach(function(u){var mc=ms.filter(function(m){return m.userId===u.id}).length;h+='<tr><td><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:'+(u.role==='admin'?'var(--primary)':'var(--text2)')+'">'+u.name.split(' ').map(function(n){return n[0]}).join('')+'</div><span class="font-semibold">'+esc(u.name)+'</span></div></td><td class="hm text-sm" style="color:var(--text2)">'+esc(u.email)+'</td><td>'+(u.role==='admin'?'<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:var(--gold);color:#fff">Admin</span>':'<span class="text-xs font-semibold px-2 py-0.5 rounded-full border" style="border-color:var(--border);color:var(--text2)">N\u00e9gociateur</span>')+'</td><td class="hm"><div class="flex flex-wrap gap-1">'+u.agencies.slice(0,3).map(function(a){return'<span class="text-[11px] px-1.5 py-0.5 rounded" style="background:var(--primary-l);color:var(--primary)">'+esc(a)+'</span>'}).join('')+(u.agencies.length>3?'<span class="text-[11px]" style="color:var(--text3)">+'+(u.agencies.length-3)+'</span>':'')+'</div></td><td class="font-semibold">'+mc+'</td><td><button class="btn bgg bs" onclick="showUM(\''+u.id+'\',\''+esc(u.name).replace(/'/g,'\\\'')+'\',\''+esc(u.email)+'\',\''+u.role+'\',\''+esc(u.agencies.join(';'))+'\')"><i class="fas fa-pen text-xs"></i></button></td></tr>'});
    h+='</tbody></table></div>';return lay(h,0);
}
window.showUM=function(uid,uname,uemail,urole,uagencies){var ie=!!uid,ag=uagencies?uagencies.split(';'):[];var acb='';AGENCIES.forEach(function(a){acb+='<label class="flex items-center gap-2 text-sm p-2 rounded-lg hover:bg-gray-50 cursor-pointer"><input type="checkbox" class="mu-ag" value="'+esc(a)+'" '+(ag.indexOf(a)>=0?'checked':'')+'> '+esc(a)+'</label>'});showModal(ie?'Modifier':'Ajouter','<div class="flex flex-col gap-4"><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Nom</label><input type="text" id="mu-n" class="inp" value="'+(ie?esc(uname):'')+'"></div><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">E-mail</label><input type="email" id="mu-e" class="inp" value="'+(ie?esc(uemail):'')+'"></div><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">R\u00f4le</label><select id="mu-r" class="inp"><option value="user" '+(urole==='user'?'selected':'')+'>N\u00e9gociateur</option><option value="admin" '+(urole==='admin'?'selected':'')+'>Administrateur</option></select></div><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Agences</label><div class="grid grid-cols-2 gap-2">'+acb+'</div></div></div>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bp" onclick="saveU(\''+(uid||'')+'\')"><i class="fas fa-save"></i> '+(ie?'Enregistrer':'Ajouter')+'</button>')};
window.saveU=function(uid){var n=$('mu-n').value.trim(),e=$('mu-e').value.trim().toLowerCase(),r=$('mu-r').value,a=[];document.querySelectorAll('.mu-ag:checked').forEach(function(c){a.push(c.value)});if(!n||!e){toast('Nom et e-mail requis','warning');return}if(!a.length){toast('S\u00e9lectionnez une agence','warning');return}S.saveUser({name:n,email:e,role:r,agencies:a},uid).then(function(){closeModal();toast(uid?'Modifi\u00e9':'Ajout\u00e9','success');render()}).catch(function(e){toast('Erreur: '+e.message,'error')})};

/* ═══ Admin clients ═══ */
function viewAdminClients(cs,ms){var h='<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--primary)">Base clients</h1><p class="text-sm mt-1" style="color:var(--text2)">'+cs.length+' client'+(cs.length>1?'s':'')+'</p></div><div class="flex gap-2"><span class="btn bo bs" onclick="showImp()"><i class="fas fa-file-import"></i> Importer</span><span class="btn bp bs" onclick="showAddC()"><i class="fas fa-plus"></i> Ajouter</span></div></div><div class="cd mb-4"><div class="p-4"><div class="relative"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--text3)"></i><input type="text" id="s-c" class="inp pl-10" placeholder="Rechercher..." oninput="filterC()"></div></div></div><div class="cd"><div class="overflow-x-auto"><table><thead><tr><th>Client</th><th>Mandats</th><th></th></tr></thead><tbody id="ctb">';
    cs.forEach(function(c){var mc=ms.filter(function(m){return m.clientName===c}).length;h+='<tr data-n="'+esc(c.toLowerCase())+'"><td class="font-semibold">'+esc(c)+'</td><td class="text-sm" style="color:var(--text2)">'+mc+'</td><td><button class="btn bgg bs text-red-600" onclick="delC(\''+esc(c).replace(/'/g,'\\\'')+'\')"><i class="fas fa-trash text-xs"></i></button></td></tr>'});
    h+='</tbody></table></div></div>';return lay(h,0)}
window.filterC=function(){var s=($('s-c')?$('s-c').value:'').toLowerCase();document.querySelectorAll('#ctb tr').forEach(function(tr){tr.style.display=!s||tr.dataset.n.indexOf(s)>=0?'':'none'})};
window.showAddC=function(){showModal('Ajouter','<label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Nom du client</label><input type="text" id="mc-n" class="inp">','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bp" onclick="addC()"><i class="fas fa-plus"></i> Ajouter</button>')};
window.addC=function(){var n=$('mc-n').value.trim();if(!n){toast('Saisissez un nom','warning');return}S.addClient(n).then(function(){closeModal();toast('Ajout\u00e9','success');render()}).catch(function(e){toast('Erreur: '+e.message,'error')})};
window.delC=function(n){showModal('Supprimer','<p class="text-sm" style="color:var(--text2)">Supprimer <strong>'+esc(n)+'</strong> ?</p>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bd" onclick="doDelC(\''+esc(n).replace(/'/g,'\\\'')+'\')"><i class="fas fa-trash"></i> Supprimer</button>')};
window.doDelC=function(n){S.deleteClient(n).then(function(){closeModal();toast('Supprim\u00e9','info');render()}).catch(function(e){toast('Erreur: '+e.message,'error')})};
window.showImp=function(){showModal('Importer','<div class="border-2 border-dashed rounded-xl p-8 text-center" style="border-color:var(--border)"><i class="fab fa-microsoft text-3xl mb-3" style="color:#00a4ef"></i><p class="font-semibold mb-1">Coller les noms clients</p><p class="text-sm mb-4" style="color:var(--text3)">Un nom par ligne</p><textarea id="imp-t" class="inp" rows="8"></textarea></div>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bp" onclick="doImp()"><i class="fas fa-file-import"></i> Importer</button>')};
window.doImp=function(){var t=$('imp-t').value.trim();if(!t){toast('Collez des noms','warning');return}var names=t.split('\n').map(function(n){return n.trim()}).filter(function(n){return n});S.importClients(names).then(function(a){closeModal();toast(a+' import\u00e9'+(a>1?'s':''),'success');render()}).catch(function(e){toast('Erreur: '+e.message,'error')})};

/* ═══ Render principal ═══ */
function render(){
    var app=$('app');
    if(!CU){app.innerHTML=viewLogin();return}
    app.innerHTML='<div class="ld"></div>';
    S.getNotifs().then(function(ns){
        var uc=ns.filter(function(n){return!n.read}).length;var p;
        switch(VW){
            case'mandats':p=Promise.all([S.getMandats(),S.getUsers()]).then(function(r){app.innerHTML=viewMandats(r[0],r[1])});break;
            case'mandat-new':p=S.getClients().then(function(c){app.innerHTML=viewMandatNew(c)});break;
            case'mandat-detail':p=Promise.all([S.getMandats(),S.getUsers(),S.getLogs(VP.id)]).then(function(r){app.innerHTML=viewMandatDetail(VP.id,r[0],r[1],r[2])});break;
            case'notifications':p=Promise.resolve(app.innerHTML=viewNotifs(ns));break;
            case'admin-users':p=Promise.all([S.getUsers(),S.getMandats()]).then(function(r){app.innerHTML=viewAdminUsers(r[0],r[1])});break;
            case'admin-clients':p=Promise.all([S.getClients(),S.getMandats()]).then(function(r){app.innerHTML=viewAdminClients(r[0],r[1])});break;
            default:p=Promise.all([S.getMandats(),S.getUsers()]).then(function(r){app.innerHTML=viewDashboard(r[0],r[1])});
        }
        if(p)p.catch(function(e){app.innerHTML='<div class="text-center py-20"><i class="fas fa-exclamation-circle text-4xl mb-4" style="color:var(--danger)"></i><p class="text-lg font-semibold mb-2">Erreur de chargement</p><p class="text-sm" style="color:var(--text2)">'+esc(e.message)+'</p><button class="btn bp mt-4" onclick="render()">R\u00e9essayer</button></div>';console.error(e)});
    }).catch(function(){
        Promise.all([S.getMandats(),S.getUsers()]).then(function(r){app.innerHTML=viewDashboard(r[0],r[1])}).catch(function(e2){app.innerHTML='<div class="text-center py-20"><i class="fas fa-exclamation-circle text-4xl mb-4" style="color:var(--danger)"></i><p class="text-sm">'+esc(e2.message)+'</p><button class="btn bp mt-4" onclick="render()">R\u00e9essayer</button></div>'});
    });
}

/* ═══ D\u00e9marrage ═══ */
var hash=parseHash();VW=hash.view;VP=hash.params;
initAuth();
</script>
</body>
