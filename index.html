<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre des mandats de gestion — REAL 31</title>
<link href="https://fonts.googleapis.com/css2?family?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#F5F5F0;--card:#fff;--border:#E0E0DC;--text:#212121;--text2:#616161;--text3:#9E9E9E;--primary:#1B5E20;--primary-h:#164A19;--primary-l:#E8F5E9;--gold:#D4A017;--danger:#C62828;--warning:#E65100;--info:#1565C0;--success:#2E7D32}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
.fi{animation:fi .3s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes br2{0%{transform:rotate(0)}10%{transform:rotate(14deg}20%{transform:rotate(-14deg)}30%{transform:rotate(8deg)}40%{transform:rotate(-8deg)}50%{transform:rotate(0)}100%{transform:rotate(0)}}
.bell-r{animation:br2 .8s ease-in-out}
.pd{animation:pd 1.5s ease-in-out}
.te{animation:ti .3s ease-out}
@keyframes ti{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.tx{animation:to3 .25s ease-in forwards}
@keyframes to3{to{opacity:0;transform:translateX(40px}}
.da{border-color:var(--primary)!important;background:var(--primary-l)!important}
.sb{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap}
.sb-a{background:#FFF3E0;color:#E65100}.sb-v{background:#E8F5E9;color:#2E7D32}.sb-x{background:#FFEBEE;color:#C62828}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-weight:600;color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:12px 16px;border-bottom:2px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:hover td{background:rgba(27,94,32,.03)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff}.bp:hover{background:var(--primary-h)}
.bo{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.bo:hover{background:var(--primary-l)}
.bd{background:var(--danger);color:#fff}.bd:hover{background:#b71c1c}
.bs{padding:6px 14px;font-size:13px}
.bgg{background:transparent;color:var(--text2);padding:8px 12px}.bgg:hover{background:rgba(0,0,0,.05);color:var(--text)}
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s;background:#fff;color:var(--text)}
.inp:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,94,32,.1)}
.cd{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fi .2s ease-out}
.mbox{background:#fff;border-radius:14px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.18)}
.nl{padding:8px 16px;border-radius:6px;font-weight:600;font-size:14px;color:var(--text2);transition:all .15s;white-space:nowrap;cursor:pointer}
.nl:hover,.nl.ac{color:var(--primary);background:var(--primary-l)}
.al{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:50;box-shadow:0 8px 16px rgba(0,0,0,.1)}
.ai{padding:10px 14px;cursor:pointer;font-size:14px}.ai:hover{background:var(--primary-l)}
.ti{display:flex;gap:16px;padding-bottom:20px;position:relative}
.ti:not(:last-child)::before{content:'';position:absolute;left:15px;top:32px;bottom:0;width:2px;background:var(--border)}
.tdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.ld{display:flex;align-items:center;justify-content:center;padding:80px 0}
.ld::after{content:'';width:36px;height:36px;border:3px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.hm{display:none!important}.nl{padding:8px 10px;font-size:13px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2" style="pointer-events:none"></div>
<div id="modal"></div>
<script>
/* ════════════════════════════════════════════════════════════
   REMPLISSEZ CES 4 VALEURS CI-DESSOUS
   ══════════════════════════════════════════════════
   ════════════════════════════════════════════════ ═══
const CLIENT_ID    = '';
const TENANT_ID    = '';
const REDIRECT_URI = '';
const SP_SITE      = '';
/* ═══ Noms des listes SharePoint ═══ */
const L_MANDATS  = 'MandatsGestion';
const L_CLIENTS  = 'ClientsMandatGestion';
const L_USERS    = 'Collaborators';
const L_NOTIFS   = 'NotifsMandatsG';
const L_LOGS     = 'JournauxMandatsG';
const L_PDF      = 'MandatsPDF';
const AGENCIES   = ['Toulouse Centre','Toulouse Compans','Blagnac','Colomiers','Tournefeuille','Plaisance-du-Touch'];

/* ═══ VÉRIFICATION DE SÉCURITÉ ═══
   Si MSAL ne charge pas, affiche la page de configuration.
   Si les 4 valeurs sont remplies mais MSAL échoue, affiche l'erreur.
   ════════════════════════════════════════════════════ */
(function checkReady(){
    if(typeof msal==='undefined'){showDiag('MSAL n\'est pas charge. Allez sur github.com/settings/security et ajoutez alcdn.msauth.net aux domaines autorises CSP.');return}
    if(!CLIENT_ID&&!TENANT_ID){showConfig();return}
    if(!REDIRECT_URI){showDiag('REDIRECT_URI est vide. Remplissez les 4 valeurs dans le fichier, puis rechargez la page.');return}
    showDiag('Configuration presente. Initialisation de MSAL...');/* initAuth sera appelé ci-dessous */
}

/* ═══ ÉTAT ═══ */
var CU=null, VW='dashboard', VP={}, msalInstance=null, _clients=[];

function $(id){return document.getElementById(id)}
function fmtD(i){if(!i)return'\u2014';return new Date(i).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtDT(i){if(!i)return'\u2014';return fmtD(i)+' '+new Date(i).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function bizSince(iso){var s=new Date(iso);s.setHours(0,0,0,0);var n=new Date();n.setHours(0,0,0,0);var c=0,d=new Date(s);while(d<n){d.setDate(d.getDate()+1);var w=d.getDay();if(w!==0&&w!==6)c++}return c}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sBadge(st){var c={attente:'sb-a',valide:'sb-v',annule:'sb-x'};var l={attente:'En attente de signature',valide:'Valid\u00e9',annule:'Annul\u00e9'};return'<span class="sb '+(c[st]||'')+'">'+(l[st]||st)+'</span>'}
function mapSI(s){if(!s)return'attente';if(s.indexOf('Valid')>=0)return'valide';if(s.indexOf('Annul')>=0)return'annule';return'attente'}
function toast(msg,type){type=type||'success';var c=$('toasts');var el=document.createElement('div');el.className='te border-l-4 border-green-600 bg-white shadow-lg rounded-lg px-4 py-3 flex items-center gap-3 min-w-[280px] max-w-[400px]';el.style.pointerEvents='auto';el.innerHTML='<span class="text-sm font-medium" style="color:var(--text)">'+esc(msg)+'</span>';c.appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(function(){el.remove()},300)},3500)}
function showModal(title,body,actions){$('modal').innerHTML='<div class="mo" onclick="if(event.target===this)closeModal()"><div class="mbox fi"><div class="px-6 py-4 border-b" style="border-color:var(--border)"><h3 class="text-lg font-bold" style="font-family:Playfair Display,serif">'+title+'</h3></div><div class="px-6 py-5">'+body+'</div><div class="px-6 py-4 flex justify-end gap-3 border-t" style="border-color:var(--border)">'+actions+'</div></div></div></div>'}
function closeModal(){$('modal').innerHTML=''}

/* ═══ LOGO ═══ */
function logo(h){h=h||'h-10';return'<svg viewBox="0 0 240 52" class="'+h+' flex-shrink-0" xmlns="http://www.w3.org/2000/svg"><g transform="translate(0,2)"><path d="M28,10 L32,4 L36,10 Z" fill="#1B5E20"/><rect x="26" y="10" width="12" height="2.5" rx=".5" fill="#1B5E20"/><rect x="27.5" y="12.5" width="1.8" height="12" fill="#1B5E20"/><rect x="31.1" y="12.5" width="1.8" height="12" fill="#1B5E20"/><rect x="34.7" y="12.5" width="1.8" height="12" fill="#1B5E20"/><rect x="26" y="24.5" width="12" height="2" rx=".5" fill="#1B5E20"/><path d="M8,22 C8,18 10,14 12,13 L13,10 L14.5,12.5 L16,10 L16.5,13 L18,12 L18.5,14.5 L20,14 L20,16.5 L21.5,16.5 L21.5,18 L20,18.5 L20.5,20 L19,20.5 L19,22.5 L17.5,23 L18,25 L16.5,25 L16,23 L14.5,25 L13,25 L13.5,23 L12,23.5 L11.5,22 Z" fill="#1B5E20"/><path d="M47,22 C47,18 45,14 43,13 L42,10 L40.5,12.5 L39,10 L38.5,13 L37,12 L36.5,14.5 L35,14 L35,16.5 L33.5,16.5 L33.5,18 L35,18.5 L34.5,20 L36,20.5 L36,22.5 L37.5,23 L37,25 L38.5,25 L39,23 L40.5,25 L42,25 L41.5,23 L43,23.5 L43.5,22 Z" fill="#1B5E20"/></g><text x="58" y="14" font-size="7" fill="#9E9E9E" font-family="Source Sans 3,sans-serif" letter-spacing=".5">DEPUIS 2005</text><text x="58" y="34" font-size="22" fill="#1B5E20" font-family="Playfair Display,serif" font-weight="900" letter-spacing=".5">REAL 31</text><text x="58" y="46" font-size="8" fill="#9E9E9E" font-family="Source Sans 3,sans-serif" font-weight="600" letter-spacing="3.5">IMMOBILIER</text></svg></svg>'}

/* ═══ ROUTEUR ═══ */
var VW='dashboard',VP={};
function nav(v,p){p=p||{};VW=v;VP=p;window.location.hash=v+(p.id?'/'+p.id:'');render()}
function parseHash(){var h=(window.location.hash||'#dashboard').slice(1).split('/');return{view:h[0]||'dashboard',params:h[1]?{id:h[1]}:{}}}
window.addEventListener('hashchange',function(){var r=parseHash();VW=r.view;VP=r.params;render()});

/* ═══ MSAL AUTH ═══ */
function initAuth(){
    try{
        var cfg={auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,redirectUri:REDIRECT_URI},cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}};
        msalInstance=new msal.PublicClientApplication(cfg);
        msalInstance.initialize().then(function(){
            msalInstance.handleRedirectPromise().then(function(resp){
                if(resp) loadUser(resp.account);
                else{var acc=msalInstance.getAllAccounts();if(acc.length)loadUser(acc[0]);else render()}
            }).catch(function(){render()})
        }).catch(function(e){showDiag('MSAL init erreur : '+e.message)});
    }catch(e){showDiag('MSAL creation erreur : '+e.message)}
}

function loadUser(account){
    CU={id:account.homeAccountId,email:account.username,name:account.name||account.username.split('@')[0].replace(/\./g,' '),role:'user',agencies:[]};
    spGet(L_USERS,"?$filter=Email eq '"+account.username+"'&$top=1").then(function(data){
        if(data.value&&data.value.length){var u=data.value[0];CU.id=String(u.Id);CU.role=u.Role||'user';CU.agencies=(u.Agences||'').split(';').filter(function(a){return a.trim()})}else{spPost(L_USERS,{Title:CU.name,DisplayName:UUID.name,Email:CU.email,Role:'user',Agences:''}).then(function(r){CU.id=String(r.Id)}).catch(function(){})}
        render()
    }).catch(function(){render()})
}

window.doLogin=function(){if(!msalInstance){toast('Configuration manquante','error');return}msalInstance.loginPopup({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All']}).catch(function(e){if(e.errorCode!=='user_cancelled')toast('Erreur: '+(e.message||e.errorCode),'error')})};
window.doLogout=function(){if(msalInstance)msalInstance.logoutPopup().catch(function(){});CU=null};

/* ═══ SHAREPOINT API ═══ */
function getToken(){var acc=msalInstance.getAllAccounts();if(!acc.length)return Promise.reject(new Error('Non connecte'));return msalInstance.acquireTokenSilent({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All'],account:acc[0]}).catch(function(){return msalInstance.acquireTokenPopup({scopes:['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All'],account:acc[0]}).then(function(r){return r.accessToken})}
function spGet(list,opts){opts=opts||'';return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items"+opts,{headers:{'Authorization':'Bearer '+t,'Accept':'application/json;odata=nometadata'}}).then(function(r){if(!r.ok)throw new Error('SharePoint '+r.status);return r.json()})})}
function spPost(list,item){return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items",{method:'POST',headers:{'Authorization':'Bearer '+t,'Accept':'application/json;odata=nometadata','Content-Type':'application/json'},body:JSON.stringify(item)}).then(function(r){if(!r.ok)throw new Error('SP POST '+r.status);return r.json()})}}
function spPatch(list,id,item){return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items("+id+")",{method:'POST',headers:{'Authorization':'Bearer '+t,'Accept':'application/json;odata=nometadata','Content-Type':'application/json','X-HTTP-':'MERGE','If-Match':'*'},body:JSON.stringify(item)}).then(function(r){if(!r.ok)throw new Error('SP PATCH '+r.status)})}}
function spDel(list,id){return getToken().then(function(t){return fetch(SP_SITE+"/_api/web/lists/getbytitle('"+list+"')/items("+id+")",{method:'POST',headers:{'Authorization':'Bearer '+t,'X-HTTP-':'DELETE','If-Match':'*'}})}).catch(function(){})}
function spUploadPDF(name,blob){return getToken().then(function(t){var path=SP_SITE.replace('https://','');return fetch(SP_SITE+"/_api/web/getfolderbyserverrelativeurl('"+path+"/"+L_PDF+"')/files/add(url='"+name+"',overwrite=true)",{method:'POST',headers:{'Authorization':'Bearer '+t,'X-HTTP-Method':'PUT'},body:blob}).then(function(r){if(!r.ok)throw new Error('Upload '+r.status);return r.json()}).then(function(d){return d.ServerRelativeUrl?'https://'+d.ServerRelativeUrl:null})})}

/* ═══ STORE ═══ */
var S={
    getUsers:function(){return spGet(L_USERS,'?$top=5000').then(function(d){return(d.value||[]).map(function(u){return{id:String(u.Id),email:u.Email||'',name:u.DisplayName||u.Title||'',role:u.Role||'user',agencies:(u.Agences||'').split(';').filter(function(a){return a.trim()})}})})},
    saveUser:function(data,id){var p={Title:data.name,DisplayName:data.name,Email:data.email,Role:data.role,Agences:data.agencies.join(';')};return id?spPatch(L_USERS,parseInt(id),p):spPost(L_USERS,p)},
    getClients:function(){return spGet(L_CLIENTS,'?$top=5000').then(function(d){return(d.value||[]).map(function(c){return c.NomClient}).filter(function(n){return n})})},
    addClient:function(n){return spPost(L_CLIENTS,{Title:n,NomClient:n})},
    deleteClient:function(n){return spGet(L_CLIENTS,"?$filter=NomClient eq '"+n.replace(/'/g,"''")+"'").then(function(r){return Promise.all((r.value||[]).map(function(it){return spDel(L_CLIENTS,it.Id)}))})},
    importClients:function(names){var added=0,chain=Promise.resolve();names.forEach(function(n){chain=chain.then(function(){return spGet(L_CLIENTS,"?$filter=NomClient eq '"+n.replace(/'/g,"''")+"'&$top=1")}).then(function(ex){if(!ex.value||!ex.value.length){added++;return spPost(L_CLIENTS,{Title:n,NomClient:n})}}).catch(function(){})});return chain.then(function(){return added})},
    getMandats:function(){return spGet(L_MANDATS,'?$top=5000&$orderby=DateCreation desc').then(function(d){return(d.value||[]).map(function(m){return{id:String(m.Id),spId:m.Id,number:parseInt(m.NumeroMandat)||0,clientName:m.NomClient||'',userId:m.UserId||'',status:mapSI(m.Statut),createdAt:m.DateCreation,uploadedAt:m.DateDepot||null,validatedAt:m.DateValidation||null,cancelledAt:m.DateAnnulation||null,cancelledBy:m.AnnulePar||null,fileName:m.NomFichier||null,fileUrl:m.UrlFichier||null}})})},
    getNextNum:function(){return spGet(L_MANDATS,'?$top=1&$orderby=NumeroMandat desc&$select=NumeroMandat').then(function(d){var v=d.value||[];return v.length?(parseInt(v[0].NumeroMandat)||4404)+1:4405})},
    createMandat:function(num,client,uid,uname){return spPost(L_MANDATS,{Title:String(num),NumeroMandat:num,NomClient:client,UserId:uid,UserName:uname,Statut:'En attente de signature',DateCreation:new Date().toISOString()})},
    uploadMandat:function(spId,file){var now=new Date().toISOString(),sn='mandat_'+spId+'_'+Date.now()+'.pdf';return spUploadPDF(sn,file).then(function(url){return spPatch(L_MANDATS,spId,{Statut:'Valide',DateDepot:now,DateValidation:now,NomFichier:file.name,UrlFichier:url})})},
    cancelMandat:function(spId,email){return spPatch(L_MANDATS,spId,{Statut:'Annule',DateAnnulation:new Date().toISOString(),AnnulePar:email})},
    getNotifs:function(){if(!CU)return Promise.resolve([]);return spGet(L_NOTIFS,"?$filter=UserId eq '"+CU.email+"'&$orderby=Created desc&$top=100").then(function(d){return(d.value||[]).map(function(n){return{id:String(n.Id),uid:n.UserId,mid:n.MandatId||'',mn:n.NumeroMandat||0,rd:n.ReminderDay||0,msg:n.Title||'',read:n.Lu===true,at:n.Created}})})},
    markRead:function(id){return spPatch(L_NOTIFS,parseInt(id),{Lu:true})},
    markAllRead:function(){return S.getNotifs().then(function(ns){return Promise.all(ns.filter(function(n){return!n.read}).map(function(n){return spPatch(L_NOTIFS,parseInt(n.id),{Lu:true})})})},
    logView:function(mid,mn){if(!CU)return;spPost(L_LOGS,{Title:'Consultation',Action:'consultation',Detail:'Mandat n\u00b0'+mn,UserId:CU.email,UserName:CU.name,MandatId:mid,NumeroMandat:parseInt(mn)||0,DateAction:new Date().toISOString()}).catch(function(){})},
    getLogs:function(mid){return spGet(L_LOGS,"?$filter=MandatId eq '"+mid+"'&$orderby=DateAction desc&$top=50").then(function(d){return(d.value||[]).map(function(l){return{uname:l.UserName||'',at:l.DateAction}})})}
};

window.cancelM=function(id,spId){showModal('Annuler','<p class="text-sm mb-4" style="color:var(--text2)">Action irreversible.</p><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Motif</label><textarea id="cancel-r" class="inp" rows="3"></textarea>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bd" onclick="doCancel(\''+id+'\','+spId+'\')"><i class="fas fa-ban"></i> Confirmer</button>')};
window.doCancel=function(id,spId){S.cancelMandat(spId,CU.email).then(function(){closeModal();toast('Mandat annule','info');nav('mandat-detail',{id:id})}).catch(function(e){toast('Erreur: '+e.message,'error')}}
function viewNotifs(ns){var ur=ns.filter(function(n){return!n.read}).length;var h='<div class="flex items-center justify-between mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--primary)">Notifications</h1></div>'+(ur>0?'<button class="btn bo bs" onclick="markAllR()"><i class="fas fa-check-double"></i> Tout lire</button>':'')+'</div></div><div class="flex flex-col gap-3">';if(!ns.length)h+='<div class="cd p-12 text-center" style="color:var(--text3)"><i class="fas fa-bell-slash text-3xl mb-3"></i><p>Aucune notification</p></div>';ns.forEach(function(n){var last=n.rd===10;h+='<div class="cd '+(n.read?'bg-amber-50/50 p-4 flex items-start gap-4 cursor-pointer border-l-4 '+(n.read?'border-amber-400':'border-left-color:var(--border)':'')+'" style="'+(n.read?'border-left-color:var(--border)':'" onclick="readN(\''+n.id+'\',\''+n.mid+'\')"'><div class="w-10 h-10 rounded-full flex items-center justify-content flex-shrink-0 mt-0.5" style="background:'+(last?'#FFEBEE':'#FFF3E0')+'"><i class="fas '+(last?'fa-exclamation-triangle':'fa-bell')+'" style="color:'+(last?'var(--danger)':'var(--warning)'+':'fa-bell')" style="color:'+(last?'var(--danger)':'var(--warning)')+'"></i></div><div class="flex-1"><div class="flex items-start gap-2 mb-3"><div class="w-6 h-6 rounded-full flex items-center justify-content text-[10px] font-bold flex-shrink-0 mt-0.5" style="background:var(--primary-l);color:var(--primary)">'+(l.uname?l.uname.split(' ').map(function(n){return n[0]}).join(''):'?')+'</div><p class="text-sm font-semibold">'+esc(l.uname||'\u2014')+'</p><p class="text-xs" style="color:var(--text3)">'+fmtDT(l.at)+'</p></div></div></div>'});h+='</div></div>';return lay(h,ur)}

function viewAdminUsers(us,ms){var h='<div class="flex items-center justify-between mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--primary)">Utilisateurs</h1></div><span class="btn bp" onclick="showUM()"><i class="fas fa-user-plus"></i> Ajouter</span></div></div><div class="cd overflow-x-auto"><table><thead><tr><th>Utilisateur</th><th class="hm">E-mail</th><th>Role</th><th class="hm">Agences</th><th>Mandats</th><th></th></tr></thead><tbody>';us.forEach(function(u){var mc=ms.filter(function(m){return m.userId===u.id}).length;h+='<tr><td><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full flex items-center justify-content text-white text-xs font-bold" style="background:'+(u.role==='admin'?'var(--primary)':'var(--text2)">'+u.name.split(' ').map(function(n){return n[0]}).join('')+'</div><span class="font-semibold">'+esc(u.name)+'</span></div></td><td class="hm text-sm" style="color:var(--text2)">'+esc(u.email)+'</td><td>'+(u.role==='admin'?'<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:var(--gold);color:#fff">Admin</span>':'<span class="text-xs font-semibold px-2 py-0.5 rounded-full border" style="border-color:var(--border);color:var(--text2)">Negociateur</span>')+'</td><td class="font-semibold">'+mc+'</td><td><button class="btn bgg bs text-red-600" onclick="showUM(\''+u.id+'\',\''+esc(u.name).replace(/'/g,'\\\'')+'\',\''+esc(u.email)+'\',\''+u.role+'\',\''+esc(u.agencies.join(';'))+'\')">enregistrer</button></td></tr>'}).join('')+'</tbody></table></div>';return lay(h,0)}
window.showUM=function(uid,uname,uemail,urole,uagencies){var ie=!!uid,ag=uagencies?uagencies.split(';'):[];var acb='';AGENCIES.forEach(function(a){acb+='<label class="flex items-center gap-2 text-sm p-2 rounded-lg hover:bg-gray-50 cursor-pointer"><input type="checkbox" class="mu-ag" value="'+esc(a)+'" '+(ag.indexOf(a)>=0?'checked':'')+'> '+esc(a)+'</label></label>'});showModal(ie?'Modifier':'Ajouter','<div class="flex flex-col gap-4"><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Nom</label><input type="text" id="mu-n" class="inp" value="'+(ie?esc(uname):'')+'"></div><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">E-mail</label><input type="email" id="mu-e" class="inp" value="'+(ie?esc(uemail):'')+'"></div><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Role</label><select id="mu-r" class="inp"><option value="user" '+(urole==='user'?'selected':'')+'>Negociateur</option><option value="admin" '+(urole==='admin'?'selected':'')+'>Administrateur</option></select></div><div><label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Agences</label><div class="grid grid-cols-2 gap-2">'+acb+'</div></div></div></div>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bp" onclick="saveU(\''+(uid||'')+'\')"><i class="fas fa-save"></i> '+(ie?'Enregistrer':'Ajouter')+'</button>')};
window.saveU=function(uid){var n=$('mu-n').value.trim(),e=$('mu-e').value.trim().toLowerCase(),r=$('mu-r').value,r=$('mu-r').value,a=[];document.querySelectorAll('.mu-ag:checked').forEach(function(c){a.push(c.value)});if(!n||!e){toast('Nom et e-mail requis','warning');return}if(!a.length){toast('Selectionnez au moins une agence','warning');return}S.saveUser({name:n,email:e,role:r,agencies:a},uid).then(function(){closeModal();toast(uid?'Modifié':'Ajouté','success');render()}).catch(function(e){toast('Erreur: '+e.message,'error')}}
function viewAdminClients(cs,ms){var h='<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6"><div><h1 class="text-2xl font-bold" style="color:var(--primary)">Base clients</h1><p class="text-sm mt-1" style="color:var(--text2)">'+cs.length+' client'+(cs.length>1?'s':'')+'</p></div><div class="flex gap-2"><span class="btn bo bs" onclick="showImp()"><i class="fas fa-file-import"></i> Importer</span><span class="btn bp bs" onclick="showAddC()"><i class="fas fa-plus"></i> Ajouter</span></div></div></div><div class="cd mb-4"><div class="p-4"><div class="relative"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--text3)"></i><input type="text" id="s-c" class="inp pl-10" placeholder="Rechercher..." oninput="filterC()"></div></div></div><div class="cd"><div class="overflow-x-auto"><table><thead><tr><th>Client</th><th>Mandats</th><th></th></tr></thead><tbody id="ctb">';cs.forEach(function(c){var mc=ms.filter(function(m){return m.clientName===c}).length;h+='<tr data-n="'+esc(c.toLowerCase())+'"><td class="font-semibold">'+esc(c)+'</td><td class="text-sm" style="color:var(--text2)">'+mc+'</td><td><button class="btn bgg bs text-red-600" onclick="delC(\''+esc(c).replace(/'/g,'\\\'')+'\')+"\"><i class="fas fa-trash text-xs"></i></button></td></tr>'}).join('')}]]></tbody></table></div></div>':''+lay(h,0)}
window.filterC=function(){var s=($('s-c')?$('s-c').value:'').toLowerCase();document.querySelectorAll('#ctb tr').forEach(function(tr){tr.style.display=!s||tr.dataset.n.indexOf(s)>=0?'':'none'})};
window.showAddC=function(){showModal('Ajouter','<label class="block text-sm font-semibold mb-1.5" style="color:var(--text2)">Nom du client</label><input type="text" id="mc-n" class="inp">','<button class="btn bgg" onclick="addC()"><i class="fas fa-plus"></i> Ajouter</button>')};
window.addC=function(){var n=$('mc-n').value.trim();if(!n){toast('Saisissez un nom','warning');return}S.addClient(n).then(function(){closeModal();toast('Ajouté','success');render()}).catch(function(e){toast('Erreur: '+e.message,'error')})};
window.delC=function(n){showModal('Supprimer','<p class="text-sm" style="color:var(--text2)">Supprimer <strong>'+esc(n)+'</strong> ?</span></div><button class="btn bgg" onclick="doDelC(\''+esc(n).replace(/'/g,'\\\'')+'\')+'\')"><i class="fas fa-trash text-xs"></i> Supprimer</button>')};
window.doDelC=function(n){S.deleteClient(n).then(function(){closeModal();toast('Supprime','info');render()}).catch(function(e){toast('Erreur: '+e.message,'error')}};
window.showImp=function(){showModal('Importer','<div class="border-2 border-dashed rounded-xl p-8 text-center" style="border-color:var(--border)"><i class="fab fa-microsoft text-3xl mb-3" style="color:#00a4ef"></i><p class="font-semibold mb-1">Coller les noms clients</p><p class="text-sm mb-4" style="color:var(--text3)">Un nom par ligne</p><textarea id="imp-t" class="inp" rows="8"></textarea></div></div>','<button class="btn bgg" onclick="closeModal()">Annuler</button><button class="btn bp" onclick="doImp()"><i class="fas fa-file-import"></i> Importer</button>')};
window.doImp=function(){var t=$('imp-t').value.trim();if(!t){toast('Collez des noms','warning');return}var names=t.split('\n').map(function(n){return n.trim()}).filter(function(n){return n!==''}).filter(function(n){return n})}).filter(function(n){return n!==clients.find(function(c){return c.toLowerCase()===n.toLowerCase()})}).length?added++}:''}).reduce(function(a,b){return a}):[]}).then(function(a){return added++;return Promise.resolve(added})}).then(function(a){closeModal();toast(a+' client'+(a>1?'s':'')+' importé(e):'+(names.length-a)+' doublon'+(names.length-a)+' doublon'+(names.length-a)+' ignorés')},'success');render()}).catch(function(e){toast('Erreur: '+e.message,'error')}};

function render(){var app=$('app');if(!CU){app.innerHTML=viewLogin();return}
app.innerHTML='<div class="ld"></div>';
S.getNotifs().then(function(ns){var uc=ns.filter(function(n){return!n.read}).length;var uc=ns.filter(function(n){return!n.read}).length;var p;switch(VW){case'mandats':p=Promise.all([S.getMandats(),S.getUsers()]).then(function(r){app.innerHTML=viewMandats(r[0],r[1])});break;case'mandat-new':p=S.getClients().then(function(c){app.innerHTML=viewMandatNew(c)});break;case'mandat-detail':p=Promise.all([S.getMandats(),S.getUsers(),S.getLogs(VP.id)]).then(function(r){app.innerHTML=viewMandatDetail(VP.id,r[0],r[1],r[2])});break;case'notifications':p=Promise.resolve(app.innerHTML=viewNotifs(ns));break;case'admin-users':p=Promise.all([S.getUsers(),S.getMandats()]).then(function(r){app.innerHTML=viewAdminUsers(r[0],r[1])});break;case'admin-clients':p=Promise.all([S.getClients(),S.getMandats()]).then(function(r){app.innerHTML=viewAdminClients(r[0],r[1])});break;default:p=Promise.all([S.getMandats(),S.getUsers()]).then(function(r){app.innerHTML=viewDashboard(r[0],r[1])})}if(p)p.catch(function(){Promise.all([S.getMandats(),S.getUsers()]).then(function(r){app.innerHTML=viewDashboard(r[0],r[1])}).catch(function(e2){app.innerHTML='<div class="text-center py-20"><i class="fas fa-exclamation-circle text-4xl mb-4" style="color:var(--danger)"></i><p class="text-sm" style="color:var(--text2)">'+esc(e2.message)+'</p><p class="text-sm" style="color:var(--text2)">Reessayer.</p></div></div>'})})})})}

var hash=parseHash();VW=hash.view;VP=hash.params;
initAuth();
</script>
